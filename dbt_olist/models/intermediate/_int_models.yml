version: 2

models:
  # 1. RFV & Segmentation Logic
  - name: int_customer_segments
    description: "Successful customer segments. Does NOT include canceled/unavailable orders."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('int_rfv_quartiles')
              field: customer_id
      - name: segment
        tests:
          - accepted_values:
              values: 
                - 'Champions'
                - 'New Customers - Promising'
                - 'Loyal Customers'
                - 'Potential Loyalists'
                - 'At Risk - Cannot Lose Them'
                - 'Hibernating - Lost'

  # 2. Financial & Payment Integrity
  - name: int_order_payments_summary
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
        - relationships:
            to: ref('stg_order_payments')
            field: order_id
      - name: total_order_payment
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

  # 3. Order Metrics
  - name: int_orders_date_validity
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: lead_time_days
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 200

  # 4. Product Categorization
  - name: int_products_categoried
    columns:
      - name: product_id
        tests:
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: order_id
        tests:
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_category_name
        tests:
          - not_null:
              severity: warn

  # 5. Top 15 Products
  - name: int_top_15_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_order_items')
              field: product_id
