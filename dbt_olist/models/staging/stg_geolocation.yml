version: 2

models:
  - name: stg_geolocation
    description: >
      Cleaned Geolocation data with Brazil boundary validation 
      and standardized (accent-free) city/state names.
    columns:
      # Core Enhanced Columns
      - name: geolocation_zip_code_prefix
        description: "Standardized 5-digit ZIP code prefix"
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 5

      - name: geolocation_city
        description: "Normalized city name (Accents removed, lower case)"
        tests:
          - not_null

      - name: geolocation_state
        description: "Standardized 2-letter state code"
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2

      - name: geolocation_lat
        description: "Latitude coordinate"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -34
              max_value: 6
              # FIX: Set to warn so the 7 outliers don't stop the build
              config:
                severity: warn

      - name: geolocation_lng
        description: "Longitude coordinate"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -74
              max_value: -34
              # FIX: Set to warn so the 9 outliers don't stop the build
              config:
                severity: warn

      # Quality Flags
      - name: zip_code_is_invalid
        description: "True if ZIP is null, wrong length, or out of 01000-99999 range"

      - name: city_is_invalid
        description: "True if city name is missing or contains numbers"

      - name: state_is_invalid
        description: "True if state code is not exactly 2 letters"

      - name: coordinates_are_invalid
        description: "True if coordinates are missing or outside Brazil bounds"
