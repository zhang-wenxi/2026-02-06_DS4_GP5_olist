version: 2

models:
  - name: stg_order_payments
    description: "Staged order payments following Silver Layer quality principles and payment value integrity"
    columns:
      # Core Enhanced Columns
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[0-9a-fA-F]{32}$'

      - name: payment_sequential
        description: "Sequence number of payment for the order"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1

      - name: payment_type
        tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card']
              # FIX: Set to warn so new payment methods don't break the build
              config:
                severity: warn

      - name: payment_installments
        description: "Number of installments for the transaction"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: payment_value
        description: "Total amount paid"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: False


      # Enhanced Quality Flags
      - name: order_id_is_invalid
        description: "Integrity Flag: True if the order_id fails 32-char hex validation."

      - name: payment_type_is_missing
        description: "Domain Flag: True if the original value was 'not_defined' or NULL."

      - name: payment_value_invalid
        description: "Financial Quality Flag: True if the amount is null or negative."

      - name: invalid_installments
        description: "Logical Validation Flag: True if installments are null or less than 1."

      # Audit & Cleaning Fields
      - name: had_duplicates
        description: "Audit Flag: True if the record was deduplicated based on order_id and payment_sequential."

      - name: ingestion_timestamp
        description: "Processing Timestamp: When the payment record entered the Silver layer."