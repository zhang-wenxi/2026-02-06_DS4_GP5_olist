version: 2

models:
  - name: stg_sellers
    description: "Staged sellers following Silver Layer quality principles and ZIP-to-City consistency"
    columns:
      # Core Enhanced Columns
      - name: seller_id
        description: "Unique seller identifier (32-char hex string)"
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: seller_zip_code_prefix
        description: "Standardized 5-digit ZIP code prefix"
        tests:
          - not_null
          - relationships:
              to: ref('stg_geolocation')
              field: geolocation_zip_code_prefix
              # FIX: Set to warn so the 7 orphaned sellers don't break the build
              config:
                severity: warn
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 5

      - name: seller_city
        description: "Normalized city name (Accents removed, mapped to most frequent variant per ZIP)"
        tests:
          - not_null

      - name: seller_state
        description: "Corrected 2-letter Brazilian state code"
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2

      # Enhanced Quality Flags
      - name: seller_id_invalid_format
        description: "True if seller_id fails 32-char hex validation"

      - name: city_name_was_standardized
        description: "True if the city name was cleaned or mapped to the most frequent variant for that ZIP"

      # Audit & Cleaning Fields
      - name: had_duplicates
        description: "Audit flag: True if record was deduplicated"

      - name: ingestion_timestamp
        description: "Timestamp of data processing"
