version: 2

models:
  - name: stg_product_category_name_translation
    description: "Matches Olist Silver Layer logic: strips accents/suffixes and patches missing translations."
    columns:
      - name: product_category_name
        description: "Primary Key: Normalized Portuguese category."
        tests:
          - unique
          - not_null
          # NEW: Ensure every category in our translation file actually exists in the product catalog
          - relationships:
              to: ref('stg_products')
              field: product_category_name

      - name: product_category_name_english
        description: "English translation (Patched with manual mapping where source is NULL)."
        tests:
          - not_null:
              config:
                severity: warn # Alerts the team without breaking the Dagster run

      - name: is_untranslated
        description: "Flag: True if English translation remains NULL after patching."

      - name: length_warning
        description: "Flag: True if names exceed 100 chars (Validity check)."

      - name: ingestion_timestamp
        description: "Audit: Processing time in the dbt pipeline."
        tests:
          - not_null
