version: 2

models:
  - name: stg_customers
    description: "Staged customer data following Silver Layer naming and quality principles"
    columns:
      # Core Enhanced Columns
      - name: customer_id
        description: "Unique customer identifier (32-char hex string)"
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: customer_unique_id
        description: "Unique identifier across multiple orders (32-char hex string)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: customer_zip_code_prefix
        description: "Standardized 5-digit zip code prefix"
        tests:
          - not_null
          - relationships:
              to: ref('stg_geolocation')
              field: geolocation_zip_code_prefix
              # This tells dbt to only FAIL if more than 300 records are missing
              config:
                warn_if: "> 0"
                error_if: "> 300" 
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 5
              
      - name: customer_city
        description: "Normalized city name (accents removed)"
        tests:
          - not_null

      - name: customer_state
        description: "Standardized 2-letter Brazilian state code"
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2

      # Enhanced Quality Flags
      - name: customer_id_is_invalid
        description: "Integrity Flag: True if the ID is malformed or null."

      - name: customer_unique_id_is_invalid
        description: "Identity Flag: True if the global identifier fails hex validation."

      - name: customer_zip_code_prefix_is_null
        description: "Missing Data Flag: True if no postal code was provided."

      - name: customer_zip_code_prefix_invalid_range
        description: "Logical Validation Flag: True if the numeric ZIP falls outside 01000-99999."

      - name: had_duplicates
        description: "Audit Flag: True if this customer_id appeared multiple times in the source."

      - name: ingestion_timestamp
        description: "Timestamp of data processing (Silver Layer entry time)"