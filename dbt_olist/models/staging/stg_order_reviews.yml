version: 2

models:
  - name: stg_order_reviews
    description: "Staged order reviews following Silver Layer quality principles, including accent removal and placeholder nullification."
    columns:
      - name: review_id
        description: "Unique review identifier (32-char hex string). Deduplicated by most recent creation date."
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: order_id
        description: "Associated order identifier (32-char hex string)."
        tests:
          - not_null
          # NEW: Relationship test to ensure reviews link to real orders
          - relationships:
              to: ref('stg_orders')
              field: order_id
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: review_score
        description: "Review score (1-5). Values originally NULL are coalesced to 0."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 5

      - name: review_comment_title
        description: "Cleaned review title. Trimmed, accents removed, and placeholders ('NA', 'nan', 'not_defined') converted to NULL."

      - name: review_comment_message
        tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[A-Za-z0-9 .,!?()à-ÿÀ-ß-]+$'
              row_condition: "review_comment_message IS NOT NULL"
              # NESTED: Indented further to be PART of the test definition
              config:
                severity: warn

      - name: review_creation_date
        description: "Timestamp of review creation. Filtered to exclude NULLs in the staging layer."
        tests:
          - not_null

      - name: review_answer_timestamp
        description: "Timestamp of when the customer submitted the review."

      - name: is_review_score_missing
        description: "Boolean flag: True if the original review_score was NULL (represented as 0 in the silver layer)."
        tests:
          - not_null

      - name: is_empty_review
        description: "Boolean flag: True if review_comment_message is NULL after cleaning."
        tests:
          - not_null

      - name: processed_at
        description: "Processing timestamp for lineage and auditing."
        tests:
          - not_null
