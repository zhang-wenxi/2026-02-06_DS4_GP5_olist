version: 2

models:
  - name: stg_orders
    description: "Staged orders following Silver Layer quality principles and timeline validation"
    tests:
      # MONITORING: Ensures Meltano hasn't dropped the ball on data volume
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1000
          max_value: 200000
    columns:
      # Core Columns
      - name: order_id
        description: "Unique order identifier (32-char hex string)"
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-fA-F]{32}$"

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'processing', 'canceled', 'unavailable', 'invoiced', 'created', 'approved']
              # FIX: Indent 'config' to align with 'values'
              config:
                severity: warn

      # LOGICAL INTEGRITY: Ensuring the arrow of time moves forward
      - name: order_purchase_timestamp
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: '2016-01-01'
              max_value: '2018-12-31'
              config:
                severity: warn

      # Enhanced Quality Flags
      - name: invalid_order_id
        description: "Flag: True if order_id is null or fails 32-char hex validation."

      - name: invalid_customer_id
        description: "Flag: True if customer_id is null or malformed."

      - name: missing_order_status
        description: "Flag: True if status is null or 'not_defined'."

      - name: invalid_order_status
        description: "Flag: True if status is not in the approved Olist set."

      # Timeline Consistency Flags
      - name: flag_delivered_before_purchase
        description: "Logical Error: True if delivery occurs before purchase."

      - name: flag_approval_before_purchase
        description: "Sequence Error: True if payment approval is timestamped before the order was placed."

      - name: flag_carrier_before_approval
        description: "Process Violation: True if handed to carrier before payment approval."

      - name: flag_customer_delivery_before_carrier
        description: "Logistics Error: True if customer delivery logged before carrier receipt."

      - name: flag_delivered_after_estimated
        description: "Performance Flag: True if actual delivery exceeded the estimate."

      # Safe Cast Validation Flags
      - name: invalid_purchase_timestamp
        description: "Flag: TRUE if purchase timestamp fails safe_cast to timestamp."

      - name: invalid_approved_timestamp
        description: "Flag: TRUE if approval timestamp fails safe_cast to timestamp."

      - name: invalid_carrier_date
        description: "Flag: TRUE if carrier hand-off date fails safe_cast to timestamp."

      - name: invalid_customer_delivery_date
        description: "Flag: TRUE if actual customer delivery date fails safe_cast to timestamp."

      - name: invalid_estimated_delivery_date
        description: "Flag: TRUE if estimated delivery date fails safe_cast to timestamp."

      # Audit trail
      - name: had_duplicates
        description: "Audit Flag: True if the order_id appeared more than once in the source."

      - name: ingestion_timestamp
        description: "Processing Timestamp: The moment current_timestamp() was called during staging."